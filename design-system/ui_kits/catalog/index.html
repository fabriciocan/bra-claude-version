/* ============================================================
   ROOT APP
   ============================================================ */

const CatalogApp = () => {
  const [view, setView] = React.useState('catalog'); // catalog | detail | compare
  const [selectedProduct, setSelectedProduct] = React.useState(null);
  const [compareList, setCompareList] = React.useState([]);

  const toggleCompare = (id) => {
    setCompareList(prev =>
      prev.includes(id)
        ? prev.filter(x => x !== id)
        : prev.length < 4 ? [...prev, id] : prev
    );
  };

  const navigate = (dest) => {
    setView(dest);
    window.scrollTo({ top: 0 });
  };

  const selectProduct = (p) => {
    setSelectedProduct(p);
    setView('detail');
    window.scrollTo({ top: 0 });
  };

  return React.createElement('div', null,
    React.createElement(CatalogNav, {
      page: view,
      onNavigate: navigate,
      compareCount: compareList.length
    }),
    React.createElement('div', { className: 'page-enter', key: view },
      view === 'catalog' && React.createElement(CatalogPage, {
        onSelectProduct: selectProduct,
        compareList,
        onToggleCompare: toggleCompare
      }),
      view === 'detail' && selectedProduct && React.createElement(ProductDetailPage, {
        product: selectedProduct,
        onBack: () => navigate('catalog'),
        onCompare: () => toggleCompare(selectedProduct.id),
        inCompare: compareList.includes(selectedProduct.id)
      }),
      view === 'compare' && React.createElement(ComparisonPage, {
        productIds: compareList,
        allProducts: PRODUCTS,
        onRemove: (id) => setCompareList(prev => prev.filter(x => x !== id)),
        onBack: () => navigate('catalog')
      })
    )
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CatalogApp));
</script>
