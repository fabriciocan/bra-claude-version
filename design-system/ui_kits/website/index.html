<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRALARMSEG — Iluminação LED Industrial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Barlow', sans-serif; background: #fff; color: #111; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }

  /* Contact form overlay */
  .contact-overlay {
    position: fixed; inset: 0; background: rgba(6,13,26,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; backdrop-filter: blur(2px);
  }
  .contact-modal {
    background: #fff; border-radius: 4px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    width: 480px; max-width: 92vw; overflow: hidden;
  }
  .contact-modal-header {
    padding: 20px 24px; border-bottom: 1px solid #EBEBEB;
    display: flex; align-items: center; justify-content: space-between;
  }
  .contact-modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700; color: #111;
  }
  .contact-modal-close {
    width: 32px; height: 32px; border: none; background: #F5F5F5;
    border-radius: 3px; cursor: pointer; font-size: 18px; color: #5A5A5A;
    display: flex; align-items: center; justify-content: center;
  }
  .contact-modal-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; font-weight: 600; color: #3A3A3A; letter-spacing: 0.02em; }
  .field input, .field select, .field textarea {
    font-family: 'Barlow', sans-serif; font-size: 15px; color: #111;
    background: #fff; border: 1px solid #DCDCDC; border-radius: 3px;
    padding: 9px 12px; outline: none; transition: border-color 150ms, box-shadow 150ms; width: 100%;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: #E35106; box-shadow: 0 0 0 3px rgba(227,81,6,0.12);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .contact-modal-footer {
    padding: 16px 24px; background: #F5F5F5; border-top: 1px solid #EBEBEB;
    display: flex; gap: 10px; justify-content: flex-end;
  }
  .btn-cancel {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 18px;
    border-radius: 3px; border: 1px solid #DCDCDC; background: #fff; color: #5A5A5A; cursor: pointer;
  }
  .btn-submit {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 9px 20px;
    border-radius: 3px; border: none; background: #E35106; color: #fff; cursor: pointer;
  }
  /* Services section */
  .services-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
  }
  .service-card {
    padding: 24px; border: 1px solid #EBEBEB; border-radius: 4px;
    transition: box-shadow 200ms, border-color 200ms;
  }
  .service-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); border-color: #DCDCDC; }
  .service-icon {
    width: 40px; height: 40px; background: #FDE8DA; border-radius: 3px;
    display: flex; align-items: center; justify-content: center; margin-bottom: 12px;
  }
  .service-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700;
    color: #111; margin-bottom: 8px;
  }
  .service-desc { font-size: 13px; color: #5A5A5A; line-height: 1.6; }
  /* Page transitions */
  .page { animation: fadeIn 200ms ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ProductCard.jsx"></script>
<script type="text/babel" src="ProductGrid.jsx"></script>
<script type="text/babel" src="ApplicationsSection.jsx"></script>
<script type="text/babel" src="SectionsAndFooter.jsx"></script>

<script type="text/babel">

/* ---- CONTACT MODAL ---- */
const ContactModal = ({ product, onClose }) => {
  const [sent, setSent] = React.useState(false);
  if (sent) return React.createElement('div', { className: 'contact-overlay', onClick: onClose },
    React.createElement('div', { className: 'contact-modal', onClick: e => e.stopPropagation(), style: { padding: 40, textAlign: 'center' } },
      React.createElement('div', { style: { fontSize: 48, marginBottom: 12 } }, '✓'),
      React.createElement('div', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 24, fontWeight: 700, color: '#111', marginBottom: 8 } }, 'Solicitação enviada!'),
      React.createElement('p', { style: { fontSize: 14, color: '#5A5A5A', marginBottom: 24 } }, 'Nossa equipe técnica entrará em contato em até 24 horas úteis.'),
      React.createElement('button', { className: 'btn-submit', onClick: onClose }, 'FECHAR')
    )
  );
  return React.createElement('div', { className: 'contact-overlay', onClick: onClose },
    React.createElement('div', { className: 'contact-modal', onClick: e => e.stopPropagation() },
      React.createElement('div', { className: 'contact-modal-header' },
        React.createElement('div', { className: 'contact-modal-title' },
          product ? `Orçamento: ${product.name}` : 'Solicitar Orçamento'
        ),
        React.createElement('button', { className: 'contact-modal-close', onClick: onClose }, '×')
      ),
      React.createElement('div', { className: 'contact-modal-body' },
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Nome da empresa *'),
          React.createElement('input', { type: 'text', placeholder: 'Ex: Metalúrgica São Paulo Ltda.' })
        ),
        React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 } },
          React.createElement('div', { className: 'field' },
            React.createElement('label', null, 'Nome do responsável'),
            React.createElement('input', { type: 'text', placeholder: 'Carlos Mendes' })
          ),
          React.createElement('div', { className: 'field' },
            React.createElement('label', null, 'Telefone / WhatsApp *'),
            React.createElement('input', { type: 'tel', placeholder: '(41) 99999-9999' })
          )
        ),
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Segmento'),
          React.createElement('select', null,
            React.createElement('option', null, 'Selecione...'),
            React.createElement('option', null, 'Galpão Industrial'),
            React.createElement('option', null, 'Frigorífico'),
            React.createElement('option', null, 'Centro Logístico'),
            React.createElement('option', null, 'Estacionamento'),
            React.createElement('option', null, 'Quadra Esportiva'),
            React.createElement('option', null, 'Outro')
          )
        ),
        React.createElement('div', { className: 'field' },
          React.createElement('label', null, 'Descrição do projeto'),
          React.createElement('textarea', { placeholder: 'Descreva o ambiente, pé-direito, área total, quantidade de pontos...' })
        )
      ),
      React.createElement('div', { className: 'contact-modal-footer' },
        React.createElement('button', { className: 'btn-cancel', onClick: onClose }, 'Cancelar'),
        React.createElement('button', { className: 'btn-submit', onClick: () => setSent(true) }, 'ENVIAR SOLICITAÇÃO')
      )
    )
  );
};

/* ---- SERVICES SECTION ---- */
const ServicesSection = ({ onNavigate }) => {
  const services = [
    { icon: '◎', title: 'Análise Técnica', desc: 'Avaliação completa do ambiente, medição de luminosidade e análise de necessidades específicas do projeto.' },
    { icon: '⊞', title: 'Projeto Personalizado', desc: 'Projeto luminotécnico detalhado com especificações técnicas e layout otimizado para o seu espaço.' },
    { icon: '▣', title: 'Venda de Produtos LED', desc: 'Luminárias, projetores e refletores LED industriais de alta qualidade com garantia estendida.' },
    { icon: '⚙', title: 'Instalação Profissional', desc: 'Equipe especializada realiza a instalação completa com segurança e dentro das normas técnicas vigentes.' },
    { icon: '≋', title: 'Eficiência Comprovada', desc: 'Cálculo de ROI e economia energética para tomada de decisão assertiva e retorno garantido.' },
    { icon: '◈', title: 'Suporte Técnico', desc: 'Acompanhamento pós-instalação e suporte técnico contínuo para máximo desempenho do sistema.' },
  ];
  return React.createElement('section', { style: { padding: '80px 0', background: '#fff' } },
    React.createElement('div', { style: { maxWidth: 1280, margin: '0 auto', padding: '0 24px', textAlign: 'center', marginBottom: 40 } },
      React.createElement('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#E35106', marginBottom: 8 } }, 'O que fazemos'),
      React.createElement('h2', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 44, fontWeight: 800, color: '#111', letterSpacing: '-0.01em', marginBottom: 12 } }, 'PROJETOS E PRODUTOS'),
      React.createElement('p', { style: { fontSize: 16, color: '#5A5A5A', maxWidth: 560, margin: '0 auto 40px' } }, 'Soluções completas em iluminação industrial: do projeto à instalação e suporte técnico.')
    ),
    React.createElement('div', { className: 'services-grid' },
      services.map((s, i) =>
        React.createElement('div', { key: i, className: 'service-card' },
          React.createElement('div', { className: 'service-icon' },
            React.createElement('span', { style: { fontSize: 20, color: '#E35106' } }, s.icon)
          ),
          React.createElement('div', { className: 'service-title' }, s.title),
          React.createElement('div', { className: 'service-desc' }, s.desc)
        )
      )
    ),
    React.createElement('div', { style: { textAlign: 'center', marginTop: 40 } },
      React.createElement('button', {
        style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 15, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', background: '#E35106', color: '#fff', padding: '13px 32px', borderRadius: 3, border: 'none', cursor: 'pointer' },
        onClick: () => onNavigate('contact')
      }, 'SOLICITAR ORÇAMENTO')
    )
  );
};

/* ---- ABOUT SECTION ---- */
const AboutSection = () =>
  React.createElement('section', { style: { padding: '80px 0', background: '#F5F5F5' }, id: 'about' },
    React.createElement('div', { style: { maxWidth: 1280, margin: '0 auto', padding: '0 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 64, alignItems: 'center' } },
      React.createElement('div', null,
        React.createElement('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#E35106', marginBottom: 12 } }, 'Quem somos'),
        React.createElement('h2', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 44, fontWeight: 800, color: '#111', marginBottom: 20, lineHeight: 1.05 } }, 'O FUTURO DA ILUMINAÇÃO INDUSTRIAL'),
        React.createElement('p', { style: { fontSize: 16, color: '#5A5A5A', lineHeight: 1.7, marginBottom: 16 } },
          'A iluminação LED industrial representa uma revolução no setor produtivo, combinando eficiência energética incomparável com durabilidade excepcional.'
        ),
        React.createElement('p', { style: { fontSize: 16, color: '#5A5A5A', lineHeight: 1.7, marginBottom: 28 } },
          'Desde 2007, a BRALARMSEG atua em Curitiba/PR fornecendo soluções completas para galpões industriais, frigoríficos, centros logísticos, estacionamentos, portos, aeroportos, supermercados e quadras esportivas.'
        ),
        React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
          ['Redução de até 70% no consumo energético', 'Menor necessidade de manutenção', 'Sustentável e de longa vida útil', 'Produtos com grau IP65 a IP68'].map(item =>
            React.createElement('div', { key: item, style: { display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, color: '#3A3A3A' } },
              React.createElement('div', { style: { width: 6, height: 6, background: '#E35106', borderRadius: '50%', flexShrink: 0 } }),
              item
            )
          )
        )
      ),
      React.createElement('div', { style: { background: '#0A1628', borderRadius: 4, padding: 40, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 } },
        [['Desde', '2007'], ['+50.000', 'Horas de vida'], ['IP68', 'Proteção máx.'], ['80%', 'Menos consumo']].map(([num, lbl]) =>
          React.createElement('div', { key: lbl, style: { textAlign: 'center' } },
            React.createElement('div', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 40, fontWeight: 800, color: '#E35106', lineHeight: 1 } }, num),
            React.createElement('div', { style: { fontSize: 11, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#5A7AA0', marginTop: 6 } }, lbl)
          )
        )
      )
    )
  );

/* ---- MAIN APP ---- */
const App = () => {
  const [page, setPage] = React.useState('home');
  const [contactProduct, setContactProduct] = React.useState(null);
  const [showContact, setShowContact] = React.useState(false);

  const navigate = (dest) => {
    if (dest === 'contact') { setContactProduct(null); setShowContact(true); return; }
    setPage(dest);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  const openProductContact = (product) => { setContactProduct(product); setShowContact(true); };

  return React.createElement(React.Fragment, null,
    React.createElement(BRAHeader, { currentPage: page, onNavigate: navigate }),

    React.createElement('main', { className: 'page', key: page },
      page === 'home' && React.createElement(React.Fragment, null,
        React.createElement(BRAHero, { onNavigate: navigate }),
        React.createElement(BRAStatsSection, null),
        React.createElement(BRAProductGrid, { onContact: openProductContact }),
        React.createElement(BRAApplicationsSection, null),
        React.createElement(ServicesSection, { onNavigate: navigate }),
        React.createElement(BRATestimonialsSection, null)
      ),
      page === 'products' && React.createElement(React.Fragment, null,
        React.createElement('div', { style: { background: '#0A1628', padding: '48px 24px 40px' } },
          React.createElement('div', { style: { maxWidth: 1280, margin: '0 auto' } },
            React.createElement('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#E35106', marginBottom: 8 } }, 'Catálogo'),
            React.createElement('h1', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 52, fontWeight: 800, color: '#fff', letterSpacing: '-0.01em' } }, 'PRODUTOS LED INDUSTRIAL')
          )
        ),
        React.createElement(BRAProductGrid, { onContact: openProductContact })
      ),
      page === 'applications' && React.createElement(React.Fragment, null,
        React.createElement('div', { style: { background: '#0A1628', padding: '48px 24px 40px' } },
          React.createElement('div', { style: { maxWidth: 1280, margin: '0 auto' } },
            React.createElement('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#E35106', marginBottom: 8 } }, 'Onde atuamos'),
            React.createElement('h1', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 52, fontWeight: 800, color: '#fff', letterSpacing: '-0.01em' } }, 'APLICAÇÕES E AMBIENTES')
          )
        ),
        React.createElement(BRAApplicationsSection, null),
        React.createElement(ServicesSection, { onNavigate: navigate })
      ),
      page === 'about' && React.createElement(React.Fragment, null,
        React.createElement('div', { style: { background: '#0A1628', padding: '48px 24px 40px' } },
          React.createElement('div', { style: { maxWidth: 1280, margin: '0 auto' } },
            React.createElement('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#E35106', marginBottom: 8 } }, 'Quem somos'),
            React.createElement('h1', { style: { fontFamily: "'Barlow Condensed',sans-serif", fontSize: 52, fontWeight: 800, color: '#fff', letterSpacing: '-0.01em' } }, 'SOBRE A BRALARMSEG')
          )
        ),
        React.createElement(AboutSection, null)
      )
    ),

    React.createElement(BRAFooter, { onNavigate: navigate }),

    showContact && React.createElement(ContactModal, {
      product: contactProduct,
      onClose: () => setShowContact(false)
    })
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
