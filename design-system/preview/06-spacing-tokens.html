<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: #fff; padding: 24px; }
  .grid { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #E35106; border-radius: 2px; width: 28px; }
  .token { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #7A7A7A; }
  .px { font-size: 10px; font-weight: 600; color: #111; }
</style>
</head>
<body>
<div class="grid">
  <div class="item"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="token">--space-1</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="token">--space-2</div></div>
  <div class="item"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="token">--space-3</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="token">--space-4</div></div>
  <div class="item"><div class="bar" style="height:20px"></div><div class="px">20</div><div class="token">--space-5</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="token">--space-6</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="token">--space-8</div></div>
  <div class="item"><div class="bar" style="height:40px"></div><div class="px">40</div><div class="token">--space-10</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="token">--space-12</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="token">--space-16</div></div>
  <div class="item"><div class="bar" style="height:80px"></div><div class="px">80</div><div class="token">--space-20</div></div>
  <div class="item"><div class="bar" style="height:96px"></div><div class="px">96</div><div class="token">--space-24</div></div>
</div>
</body>
</html>
