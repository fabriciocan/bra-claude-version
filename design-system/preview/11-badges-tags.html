<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: #fff; padding: 24px; }
  .section { margin-bottom: 20px; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #7A7A7A; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; font-family: 'JetBrains Mono', monospace; }
  .badge-orange { background: #FDE8DA; color: #B83E04; }
  .badge-blue { background: #DCE8F8; color: #002878; }
  .badge-green { background: #E6F5EE; color: #1A8A4A; }
  .badge-gray { background: #F0F0F0; color: #3A3A3A; }
  .badge-dark { background: #111; color: #fff; }
  .badge-warning { background: #FEF3C7; color: #D97706; }
  .badge-danger { background: #FEE2E2; color: #DC2626; }
  .tag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 3px; border: 1px solid; }
  .tag-segment { background: #F5F5F5; color: #3A3A3A; border-color: #DCDCDC; }
  .stat-badge { background: #0A1628; color: #fff; padding: 8px 14px; border-radius: 3px; display: inline-flex; flex-direction: column; align-items: center; }
  .stat-num { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; color: #E35106; line-height: 1; }
  .stat-txt { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #A0B4CC; margin-top: 2px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&display=swap" rel="stylesheet">
</head>
<body>
<div class="section">
  <div class="section-label">IP Rating Badges</div>
  <div class="row">
    <span class="badge badge-blue">IP20</span>
    <span class="badge badge-blue">IP65</span>
    <span class="badge badge-blue">IP66</span>
    <span class="badge badge-dark">IP67</span>
    <span class="badge badge-dark">IP68</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Status Badges</div>
  <div class="row">
    <span class="badge badge-green">Disponível</span>
    <span class="badge badge-warning">Sob Consulta</span>
    <span class="badge badge-danger">Descontinuado</span>
    <span class="badge badge-orange">Destaque</span>
    <span class="badge badge-gray">Certificado INMETRO</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Segment Tags</div>
  <div class="row">
    <span class="tag tag-segment">Galpão Industrial</span>
    <span class="tag tag-segment">Frigorífico</span>
    <span class="tag tag-segment">Centro Logístico</span>
    <span class="tag tag-segment">Estacionamento</span>
    <span class="tag tag-segment">Quadra Esportiva</span>
  </div>
</div>
<div class="section">
  <div class="section-label">Stat Callouts</div>
  <div class="row">
    <div class="stat-badge"><div class="stat-num">80%</div><div class="stat-txt">Economia</div></div>
    <div class="stat-badge"><div class="stat-num">+50k</div><div class="stat-txt">Horas de vida</div></div>
    <div class="stat-badge"><div class="stat-num">IP68</div><div class="stat-txt">Proteção máx.</div></div>
    <div class="stat-badge"><div class="stat-num">160</div><div class="stat-txt">lm/W eficiência</div></div>
  </div>
</div>
</body>
</html>
