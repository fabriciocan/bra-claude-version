<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: #fff; padding: 24px; }
  .row { display: flex; gap: 0; }
  .swatch { flex: 1; height: 60px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px 8px; }
  .swatch-label { font-size: 10px; font-weight: 600; }
  .swatch-hex { font-family: 'JetBrains Mono', monospace; font-size: 9px; opacity: 0.65; margin-top: 2px; }
  .dark .swatch-label, .dark .swatch-hex { color: #fff; }
  .light .swatch-label, .light .swatch-hex { color: #111; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch light" style="background:#FAFAFA;border:1px solid #eee;border-radius:4px 0 0 4px">
    <div class="swatch-label">50</div>
    <div class="swatch-hex">#FAFAFA</div>
  </div>
  <div class="swatch light" style="background:#F5F5F5;border:1px solid #eee">
    <div class="swatch-label">100</div>
    <div class="swatch-hex">#F5F5F5</div>
  </div>
  <div class="swatch light" style="background:#E8E8E8">
    <div class="swatch-label">200</div>
    <div class="swatch-hex">#E8E8E8</div>
  </div>
  <div class="swatch light" style="background:#DCDCDC">
    <div class="swatch-label">300</div>
    <div class="swatch-hex">#DCDCDC</div>
  </div>
  <div class="swatch light" style="background:#BABABA">
    <div class="swatch-label">400</div>
    <div class="swatch-hex">#BABABA</div>
  </div>
  <div class="swatch light" style="background:#8A8A8A">
    <div class="swatch-label">500</div>
    <div class="swatch-hex">#8A8A8A</div>
  </div>
  <div class="swatch dark" style="background:#5A5A5A">
    <div class="swatch-label">600</div>
    <div class="swatch-hex">#5A5A5A</div>
  </div>
  <div class="swatch dark" style="background:#3A3A3A">
    <div class="swatch-label">700</div>
    <div class="swatch-hex">#3A3A3A</div>
  </div>
  <div class="swatch dark" style="background:#222222">
    <div class="swatch-label">800</div>
    <div class="swatch-hex">#222222</div>
  </div>
  <div class="swatch dark" style="background:#111111;border-radius:0 4px 4px 0">
    <div class="swatch-label">900</div>
    <div class="swatch-hex">#111111</div>
  </div>
</div>
</body>
</html>
