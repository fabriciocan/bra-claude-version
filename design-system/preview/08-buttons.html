<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Barlow', sans-serif; background: #fff; padding: 24px; }
  .section { margin-bottom: 20px; }
  .label { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: #7A7A7A; margin-bottom: 10px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn { display: inline-flex; align-items: center; gap: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border: none; cursor: pointer; transition: all 150ms ease-out; text-decoration: none; }
  /* Sizes */
  .btn-sm { font-size: 12px; padding: 6px 14px; border-radius: 3px; }
  .btn-md { font-size: 14px; padding: 10px 20px; border-radius: 3px; }
  .btn-lg { font-size: 16px; padding: 14px 28px; border-radius: 3px; }
  /* Variants */
  .btn-primary { background: #E35106; color: #fff; }
  .btn-primary:hover { background: #B83E04; }
  .btn-secondary { background: #003DA5; color: #fff; }
  .btn-secondary:hover { background: #002878; }
  .btn-outline { background: transparent; color: #E35106; border: 2px solid #E35106; }
  .btn-outline:hover { background: #E35106; color: #fff; }
  .btn-outline-blue { background: transparent; color: #003DA5; border: 2px solid #003DA5; }
  .btn-ghost { background: transparent; color: #E35106; border: none; text-decoration: underline; }
  .btn-ghost:hover { color: #B83E04; }
  .btn-dark { background: #fff; color: #111; }
  .btn-dark:hover { background: #E35106; color: #fff; }
  .btn-disabled { background: #DCDCDC; color: #8A8A8A; cursor: not-allowed; }
  .divider { width: 1px; height: 32px; background: #EBEBEB; }
  .dark-bg { background: #0A1628; padding: 16px; border-radius: 4px; }
</style>
</head>
<body>
<div class="section">
  <div class="label">Primary — Orange</div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Orçamento</button>
    <button class="btn btn-primary btn-md">Solicitar Orçamento</button>
    <button class="btn btn-primary btn-lg">Solicitar Orçamento Agora</button>
  </div>
</div>
<div class="section">
  <div class="label">Secondary — Blue</div>
  <div class="row">
    <button class="btn btn-secondary btn-sm">Ver Produtos</button>
    <button class="btn btn-secondary btn-md">Ver Catálogo Técnico</button>
    <button class="btn btn-secondary btn-lg">Ver Todos os Produtos</button>
  </div>
</div>
<div class="section">
  <div class="label">Outline &amp; Ghost</div>
  <div class="row">
    <button class="btn btn-outline btn-md">Entrar em Contato</button>
    <button class="btn btn-outline-blue btn-md">Ver Aplicações</button>
    <button class="btn btn-ghost btn-md">Saiba Mais →</button>
    <button class="btn btn-disabled btn-md" disabled>Indisponível</button>
  </div>
</div>
<div class="section">
  <div class="label">On Dark Background</div>
  <div class="dark-bg">
    <div class="row">
      <button class="btn btn-primary btn-md">Solicitar Orçamento</button>
      <button class="btn btn-dark btn-md">Ver Produtos</button>
      <button class="btn btn-outline btn-md" style="border-color:#fff;color:#fff">Saiba Mais</button>
    </div>
  </div>
</div>
</body>
</html>
